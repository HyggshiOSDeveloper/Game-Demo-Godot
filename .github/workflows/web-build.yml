name: Web Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "UVZ"
  # NOTE: this must match the preset name exactly as it appears in export_presets.cfg
  EXPORT_PRESET: "Web" # per export_presets.cfg

jobs:
  export-web:
    name: Export Web (HTML5/WASM)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Create build directory
        run: mkdir -v -p build/web

      - name: Export Web build
        run: |
          godot --headless --verbose --export-release "${EXPORT_PRESET}" ./build/web/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-web
          path: build/web/
          retention-days: 14

      # Optional: deploy the web build straight to GitHub Pages.
      # Uncomment below and enable Pages (Settings > Pages > Source: GitHub Actions).
