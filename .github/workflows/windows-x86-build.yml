name: Windows x86 Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "UVZ"
  # NOTE: this must match the preset name exactly as it appears in export_presets.cfg
  EXPORT_PRESET: "Windows Desktop" # x86_64, per export_presets.cfg

jobs:
  export-windows-x86:
    name: Export Windows (x86_64)
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Create build directory
        run: mkdir -v -p build/windows-x86_64

      - name: Export Windows x86_64 build
        run: |
          godot --headless --verbose --export-release "${EXPORT_PRESET}" ./build/windows-x86_64/${EXPORT_NAME}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-windows-x86_64
          path: build/windows-x86_64/
          retention-days: 14
